--- 

- name: Install httpd on Centos
  ansible.builtin.yum:
    name: httpd
    state: present
  when: ansible_os_family == "RedHat"

- name: Install apache2 on Ubuntu
  ansible.builtin.apt:
    name: apache2
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Start httpd on Centos and enable on boot
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"


- name: Start webservice on Ubuntu and enable on boot
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: yes
  when: ansible_os_family == "Debian"

- name: Install standard tools on redhat
  ansible.builtin.yum:
    name: "{{ item }}"
    state: present
  loop:
    - git
    - wget
    - zip
    - unzip
    - htop
  when: ansible_os_family == "RedHat"

- name: Install standard tools on ubuntu
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - git
    - wget
    - zip
    - unzip
    - htop
  when: ansible_os_family == "Debian"

- name: Install mariadb
  ansible.builtin.yum:
    name: mariadb105-server
    state: present
  when: ansible_os_family == "RedHat"

- name: Start the db service on boot
  ansible.builtin.service:
    name: mariadb
    state: started 
    enabled: yes
  when: ansible_os_family == "RedHat"  
