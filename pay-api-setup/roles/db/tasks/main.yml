---
# tasks file for roles/db
#
- name: Install mariadb
  ansible.builtin.yum:
    name: mariadb105-server
    state: present
  when: ansible_os_family == "RedHat"

- name: Start the db service on boot
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"  
